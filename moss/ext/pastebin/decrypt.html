<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light dark">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    textarea { 
      width: 100%;
      height: 180px;
      font-family: monospace;
      font-size: 1.05rem;
      padding: 12px;
      box-sizing: border-box;
    }
    .row {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
      margin: 2rem 0 1.8rem;
    }
    button {
      padding: 12px 32px;
      font-size: 1.1rem;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    #status {
      font-weight: 500;
      min-height: 1.4em;
    }
  </style>
</head>
<body>

<script id="encrypted-data" type="application/json">{{PAYLOAD}}</script>
{{AES_SCRIPT}}

<div class="row">
  <button onclick="decryptIt()">Re-Enter Password</button>
  <button id="copy-btn" onclick="copyToClipboard()">Copy</button>
  <span id="status"></span>
</div>

<textarea id="result" disabled></textarea>

<script>
function waitForAesJs(callback, timeout = 5000) {
    const start = Date.now();
    const check = () => {
        if (window.aesjs) {
            callback(window.aesjs);
            return;
        }
        if (Date.now() - start > timeout) {
            console.error('aes.js not loaded');
            return;
        }
        setTimeout(check, 50);
    };
    check();
}

async function sha256(message) {
  if (typeof crypto !== 'undefined' && crypto.subtle) {
    const encoder = new TextEncoder();
    const data = encoder.encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return new Uint8Array(hashBuffer);
  }
  const encoder = new TextEncoder();
  const data = encoder.encode(message);
  const hash = new Uint8Array(32);
  for (let i = 0; i < data.length; i++) {
    hash[i % 32] = (hash[i % 32] + data[i]) % 256;
  }
  return hash;
}

async function deriveKey(password, salt) {
  const passwordBytes = new TextEncoder().encode(password);
  const saltBytes = salt || new Uint8Array(16);
  
  const combined = new Uint8Array(passwordBytes.length + saltBytes.length);
  combined.set(passwordBytes);
  combined.set(saltBytes, passwordBytes.length);
  
  const hash = await sha256(combined);
  
  return hash.slice(0, 16);
}

function copyToClipboard() {
  const result = document.getElementById("result");
  const text = result.textContent;
  if (result.className === "error") {
    document.getElementById("status").innerText = "Nothing to copy";
    return;
  }
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById("status").innerText = "Copied!";
  }).catch(() => {
    document.getElementById("status").innerText = "Copy failed :(";
  });
}

function base64ToBuf(b64) {
  const bin = atob(b64.trim());
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decryptIt() {
  const status = document.getElementById("status");
  const result = document.getElementById("result");

  status.textContent = "";
  result.textContent = "";
  result.className = "";

  const jsonStr = document.getElementById('encrypted-data').textContent.trim();
  if (!jsonStr) {
    status.textContent = "No encrypted data available";
    result.className = "error";
    result.textContent = "The payload placeholder was not replaced by the server.";
    return;
  }

  let payload;
  try {
    payload = JSON.parse(jsonStr);
  } catch (e) {
    status.textContent = "Invalid data format";
    result.className = "error";
    result.textContent = "Could not parse the encrypted payload.\n\n" + e.message;
    return;
  }

  const { type, iv, salt, data, tag } = payload;
  if (!iv || !salt || !data) {
    status.textContent = "Missing fields";
    result.className = "error";
    result.textContent = "Payload is missing iv, salt or data";
    return;
  }

  let password;
  let key = "{{SAVE_PSWD}}";
  let hardcodedPswd = "{{HARDCODED_PSWD}}";
  
  if (hardcodedPswd) {
    password = hardcodedPswd;
  } else if (key) {
    password = localStorage.getItem(key) ?? null;
  }
  
  if (!password) {
    password = prompt("Enter decryption password:", "");
    if (key && password) {
      localStorage.setItem(key, password);
    }
  }

  if (!password) {
    status.textContent = "Cancelled";
    return;
  }

  status.textContent = "Decrypting...";

  try {
    const saltBuf = base64ToBuf(salt);
    const ivBuf   = base64ToBuf(iv);
    const ctBuf   = base64ToBuf(data);

    const keyBytes = await deriveKey(password, saltBuf);

    if (type === "aes-gcm" && crypto.subtle) {
      if (!tag) throw new Error("Missing auth tag for GCM decryption");
      
      const ciphertext = new Uint8Array(ctBuf.length + 16);
      ciphertext.set(ctBuf);
      ciphertext.set(base64ToBuf(tag), ctBuf.length);
      
      try {
        const decryptedBuffer = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: ivBuf },
          await crypto.subtle.importKey("raw", keyBytes, "AES-GCM", false, ["decrypt"]),
          ciphertext
        );
        
        const plaintext = new TextDecoder().decode(new Uint8Array(decryptedBuffer));
        result.textContent = plaintext;
        result.className = "success";
        status.textContent = "Decrypted successfully (GCM) ✓";
      } catch (e) {
        throw new Error("GCM decryption failed: " + (e.message || "auth tag verification failed"));
      }
    } else {
      if (ivBuf.length !== 16)  throw new Error("IV must be 16 bytes for AES-CBC");
      if (saltBuf.length !== 16) throw new Error("Salt must be 16 bytes");
      if (ctBuf.length < 16)     throw new Error("Ciphertext too short");
      if (ctBuf.length % 16 !== 0) throw new Error("Ciphertext must be multiple of 16 bytes");

      waitForAesJs((aesjs) => {
        const aesCbc = new aesjs.ModeOfOperation.cbc(keyBytes, ivBuf);
        const decrypted = aesCbc.decrypt(Array.from(ctBuf));

        const padValue = decrypted[decrypted.length - 1];
        const plaintextBytes = decrypted.slice(0, decrypted.length - padValue);

        const plaintext = new TextDecoder().decode(new Uint8Array(plaintextBytes));

        result.textContent = plaintext;
        result.className = "success";
        status.textContent = "Decrypted successfully (CBC) ✓";
      });
    }
  } catch (err) {
    console.error(err);
    let msg = err.message || "Decryption failed";

    status.textContent = "Decryption failed";
    result.className = "error";
    result.textContent = msg;
  }
}

decryptIt();
</script>

</body>
</html>
