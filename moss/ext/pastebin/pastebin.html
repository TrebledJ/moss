<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light dark">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    textarea {
      width: 100%;
      height: 180px;
      font-family: monospace;
      font-size: 1.05rem;
      padding: 12px;
      box-sizing: border-box;
    }
    .controls {
      margin: 1.5rem 0;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    button {
      padding: 12px 32px;
      font-size: 1.1rem;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    #status {
      padding: 3px 8px;
      border-radius: 6px;
      min-height: 1em;
    }
    .success { background: #e6ffe6; color: #006600; }
    .error   { background: #ffe6e6; color: #990000; }
  </style>
</head>
<body>

<textarea id="message" placeholder="Type or paste your message here..."></textarea>

<div class="controls">
  <button onclick="encryptAndSend()">Encrypt & Send</button>
  <span id="status"></span>
  <a id="link" href="javascript:void(0)"></a>
</div>

<div id="https-warning" style="background:#fff3cd;padding:12px;border-radius:6px;margin-top:1rem;display:none;">
  <strong>Security Notice:</strong> This server supports HTTPS.
  <a id="https-link" href="">Click here to access via HTTPS</a> for better encryption (AES-GCM with crypto.subtle).
</div>

<script>
const httpsLink = "{{HTTPS_LINK}}";
if (httpsLink) {
  const warning = document.getElementById('https-warning');
  const link = document.getElementById('https-link');
  warning.style.display = 'block';
  link.href = httpsLink;
}
</script>
<script>
// Conditionally load aes.js only if crypto.subtle is NOT available
if (typeof crypto === 'undefined' || !crypto.subtle) {
  (async () => {
      await import("{{PATH}}/aes.js");
      console.log("aes.js loaded");
  })();
}
</script>
<script>
function waitForAesJs(callback, timeout = 5000) {
    const start = Date.now();
    const check = () => {
        if (window.aesjs) {
            callback(window.aesjs);
            return;
        }
        if (Date.now() - start > timeout) {
            console.error('aes.js not loaded');
            return;
        }
        setTimeout(check, 50);
    };
    check();
}

async function sha256(message) {
  if (typeof crypto !== 'undefined' && crypto.subtle) {
    const encoder = new TextEncoder();
    const data = encoder.encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return new Uint8Array(hashBuffer);
  }
  const encoder = new TextEncoder();
  const data = encoder.encode(message);
  const hash = new Uint8Array(32);
  for (let i = 0; i < data.length; i++) {
    hash[i % 32] = (hash[i % 32] + data[i]) % 256;
  }
  return hash;
}

async function deriveKey(password, salt, iterations = 400000) {
  const passwordBytes = new TextEncoder().encode(password);
  const saltBytes = salt || new Uint8Array(16);
  
  const combined = new Uint8Array(passwordBytes.length + saltBytes.length);
  combined.set(passwordBytes);
  combined.set(saltBytes, passwordBytes.length);
  
  const hash = await sha256(combined);
  
  return hash.slice(0, 16);
}

function bufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.length; i += 8192) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
  }
  return btoa(binary);
}

function base64ToBuf(b64) {
  const bin = atob(b64.trim());
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function encryptAndSend() {
  const link = document.getElementById("link");
  const status = document.getElementById("status");
  status.textContent = "";
  status.className = "";

  const textarea = document.getElementById("message");
  const plaintext = textarea.value;

  if (!plaintext) {
    status.textContent = "Please enter some text first.";
    status.className = "error";
    return;
  }

  let password;
  let key = "{{SAVE_PSWD}}";
  let hardcodedPswd = "{{HARDCODED_PSWD}}";
  
  if (hardcodedPswd) {
    password = hardcodedPswd;
  } else if (key) {
    password = localStorage.getItem(key) ?? null;
  }
  
  if (!password) {
    password = prompt("Password:", "");
    if (key && password) {
      localStorage.setItem(key, password);
    }
  }
  
  if (!password) {
    status.textContent = "Encryption cancelled (no password entered).";
    status.className = "error";
    return;
  }

  link.href = "javascript:void(0)";
  link.textContent = "";

  try {
    status.textContent = "Encrypting...";
    status.className = "";

    const useGCM = typeof crypto !== 'undefined' && crypto.subtle;
    
    if (useGCM) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const keyBytes = await deriveKey(password, salt);
      const encoder = new TextEncoder();
      const plaintextBytes = encoder.encode(plaintext);
      
      const encryptedBuffer = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        await crypto.subtle.importKey("raw", keyBytes, "AES-GCM", false, ["encrypt"]),
        plaintextBytes
      );
      
      const encryptedBytes = new Uint8Array(encryptedBuffer);
      const ciphertext = encryptedBytes.slice(0, -16);
      const tag = encryptedBytes.slice(-16);
      
      const payload = {
        type: "aes-gcm",
        iv: bufferToBase64(iv),
        salt: bufferToBase64(salt),
        data: bufferToBase64(ciphertext),
        tag: bufferToBase64(tag)
      };
      
      await sendToServer(payload, status, link);
    } else {
      waitForAesJs(async (aesjs) => {
        try {
          const salt = new Uint8Array(Array.from({length: 16}, () => Math.floor(Math.random() * 256)));
          const iv = new Uint8Array(Array.from({length: 16}, () => Math.floor(Math.random() * 256)));
          const keyBytes = await deriveKey(password, salt);
          const aesCbc = new aesjs.ModeOfOperation.cbc(keyBytes, iv);
          const encoder = new TextEncoder();
          const plaintextBytes = encoder.encode(plaintext);
      
          const paddedLength = Math.ceil(plaintextBytes.length / 16) * 16;
          const padded = new Uint8Array(paddedLength);
          padded.set(plaintextBytes);
          const padValue = paddedLength - plaintextBytes.length;
          for (let i = plaintextBytes.length; i < paddedLength; i++) {
            padded[i] = padValue;
          }
      
          const encrypted = aesCbc.encrypt(Array.from(padded));
      
          const payload = {
            type: "aes-cbc",
            iv: bufferToBase64(iv),
            salt: bufferToBase64(salt),
            data: bufferToBase64(new Uint8Array(encrypted))
          };
      
          await sendToServer(payload, status, link);
        } catch (err) {
          console.error(err);
          status.textContent = "Error: " + (err.message || "Encryption / network failure");
          status.className = "error";
        }
      });
    }
  } catch (err) {
    console.error(err);
    status.textContent = "Error: " + (err.message || "Encryption / network failure");
    status.className = "error";
  }
}

async function sendToServer(payload, status, link) {
  try {
    const response = await fetch("{{PATH}}", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      throw new Error(`Server returned ${response.status}`);
    }

    const result = await response.json();

    status.textContent = result.message || "Message sent successfully (encrypted)";
    status.className = "success";
    link.href = result.url;
    link.textContent = result.url;
  } catch (err) {
    throw err;
  }
}
</script>

</body>
</html>
